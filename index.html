<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Personal Email from Amrit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="hero">
      <h1>A Personal Email from Amrit</h1>
      <p class="tagline">You'll receive a handwritten email from me personally saying "hi".</p>

      <div class="product-card">
        <div class="product-details">
          <span class="product-name">The Email</span>
          <span class="product-price">from $0.50</span>
        </div>
        <p class="product-description">One email. One word. Maximum sincerity.</p>
        <div class="button-group">
          <button class="buy-button" onclick="checkout('email', 'payment')">Buy Once — $0.50</button>
          <button class="buy-button secondary" onclick="checkout('email', 'monthly')">Monthly — $0.60/mo</button>
          <button class="buy-button secondary" onclick="checkout('email', 'yearly')">Yearly — $0.70/yr</button>
        </div>
      </div>

      <div class="product-card">
        <div class="product-details">
          <span class="product-name">The Email with Emoji</span>
          <span class="product-price">$1.00</span>
        </div>
        <p class="product-description">Same email. Added flair. Worth every cent.</p>
        <button class="buy-button" onclick="checkout('emoji-email', 'payment')">Buy Now — $1.00</button>
      </div>
    </section>
  </main>
  <footer>
    <p>© 2026 amritsridhar.com</p>
  </footer>
  <script>
    async function checkout(product, mode) {
      const btn = event.currentTarget;
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Loading...';

      try {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product, mode }),
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = originalText;
        }
      } catch (e) {
        alert('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }
  </script>
</body>
</html>
