<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Personal Email from Amrit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="hero">
      <h1>A Personal Email from Amrit</h1>
      <p class="tagline">You'll receive a handwritten email from me personally saying "hi".</p>
      <div class="product-card">
        <div class="product-details">
          <span class="product-name">The Email</span>
          <span class="product-price">$0.50</span>
        </div>
        <p class="product-description">
          One email. One word. Maximum sincerity.
        </p>
        <button class="buy-button" id="buy-btn">Buy Now</button>
      </div>
    </section>
  </main>
  <footer>
    <p>© 2026 amritsridhar.com</p>
  </footer>
  <script>
    document.getElementById('buy-btn').addEventListener('click', async () => {
      const btn = document.getElementById('buy-btn');
      btn.disabled = true;
      btn.textContent = 'Loading...';

      try {
        const res = await fetch('/api/checkout', { method: 'POST' });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Buy Now';
        }
      } catch (e) {
        alert('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Buy Now';
      }
    });
  </script>
</body>
</html>
